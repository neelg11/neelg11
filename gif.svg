<svg width="1000" height="240" viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Indraneel Ghosh - Speech and NLP Researcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EE4C2C"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD21E"/>
      <stop offset="100%" stop-color="#EE4C2C"/>
    </linearGradient>
    <style>
      @keyframes b0  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(3.6); } }
      @keyframes b1  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(2.2); } }
      @keyframes b2  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(2.6); } }
      @keyframes b3  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(2.0); } }
      @keyframes b4  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(2.7); } }
      @keyframes b5  { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(2.1); } }
      @keyframes glow { 0%,100% { opacity: 0.65; } 50% { opacity: 1; } }
      .bar { transform-box: fill-box; transform-origin: center; }
      .a0 { animation: b0 1.3s ease-in-out infinite; }
      .a1 { animation: b1 1.1s ease-in-out infinite; }
      .a2 { animation: b2 1.5s ease-in-out infinite; }
      .a3 { animation: b3 1.0s ease-in-out infinite; }
      .a4 { animation: b4 1.4s ease-in-out infinite; }
      .a5 { animation: b5 1.2s ease-in-out infinite; }
      .d1 { animation-delay: 0.15s; } .d2 { animation-delay: 0.3s; }
      .d3 { animation-delay: 0.05s; } .d4 { animation-delay: 0.25s; }
      .d5 { animation-delay: 0.4s; } .d6 { animation-delay: 0.1s; }
      .tagline { animation: glow 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1000" height="240" rx="16" fill="url(#bg)"/>
  <line x1="40" y1="120" x2="960" y2="120" stroke="#21262d" stroke-width="1"/>

  <g transform="translate(40,120)" fill="url(#wave)">
    <rect class="bar a0"    x="0"   y="-12" width="6" height="24" rx="3"/>
    <rect class="bar a1 d1" x="14"  y="-20" width="6" height="40" rx="3"/>
    <rect class="bar a2 d2" x="28"  y="-14" width="6" height="28" rx="3"/>
    <rect class="bar a3 d3" x="42"  y="-26" width="6" height="52" rx="3"/>
    <rect class="bar a4 d4" x="56"  y="-12" width="6" height="24" rx="3"/>
    <rect class="bar a5 d5" x="70"  y="-22" width="6" height="44" rx="3"/>
    <rect class="bar a0 d6" x="84"  y="-16" width="6" height="32" rx="3"/>
    <rect class="bar a1 d4" x="98"  y="-13" width="6" height="26" rx="3"/>
    <rect class="bar a2 d2" x="112" y="-22" width="6" height="44" rx="3"/>
    <rect class="bar a3"    x="126" y="-11" width="6" height="22" rx="3"/>
  </g>

  <g transform="translate(820,120)" fill="url(#wave2)">
    <rect class="bar a2 d2" x="0"   y="-22" width="6" height="44" rx="3"/>
    <rect class="bar a1 d4" x="14"  y="-13" width="6" height="26" rx="3"/>
    <rect class="bar a0 d6" x="28"  y="-16" width="6" height="32" rx="3"/>
    <rect class="bar a3 d3" x="42"  y="-26" width="6" height="52" rx="3"/>
    <rect class="bar a4 d4" x="56"  y="-12" width="6" height="24" rx="3"/>
    <rect class="bar a5 d5" x="70"  y="-22" width="6" height="44" rx="3"/>
    <rect class="bar a2 d2" x="84"  y="-14" width="6" height="28" rx="3"/>
    <rect class="bar a1 d1" x="98"  y="-20" width="6" height="40" rx="3"/>
    <rect class="bar a0"    x="112" y="-12" width="6" height="24" rx="3"/>
  </g>

  <text x="500" y="110" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#f0f6fc" letter-spacing="1">
    Indraneel Ghosh
  </text>
  <text class="tagline" x="500" y="152" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="21" font-weight="600" fill="#FFD21E" letter-spacing="2">
    Speech &amp; NLP Researcher
  </text>
</svg>
