    <rect x="98"  y="-20" width="6" height="40"  rx="3"><animate attributeName="height" values="40;90;40" dur="1.1s" begin="0.15s" repeatCount="indefinite"/><animate attributeName="y" values="-20;-45;-20" dur="1.1s" begin="0.15s" repeatCount="indefinite"/></rect>
    <rect x="112" y="-8"  width="6" height="16"  rx="3"><animate attributeName="height" values="16;60;16" dur="1.3s" begin="0.0s" repeatCount="indefinite"/><animate attributeName="y" values="-8;-30;-8" dur="1.3s" begin="0.0s" repeatCount="indefinite"/></rect>
