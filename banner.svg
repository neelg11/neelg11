    <rect x="28"  y="-14" width="6" height="28"  rx="3"><animate attributeName="height" values="28;72;28" dur="1.5s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="-14;-36;-14" dur="1.5s" begin="0.3s" repeatCount="indefinite"/></rect>
