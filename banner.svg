    <rect x="56"  y="-10" width="6" height="20"  rx="3"><animate attributeName="height" values="20;54;20" dur="1.4s" begin="0.25s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-27;-10" dur="1.4s" begin="0.25s" repeatCount="indefinite"/></rect>
    <rect x="70"  y="-24" width="6" height="48"  rx="3"><animate attributeName="height" values="48;100;48" dur="1.2s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="y" values="-24;-50;-24" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></rect>
    <rect x="84"  y="-16" width="6" height="32"  rx="3"><animate attributeName="height" values="32;78;32" dur="1.35s" begin="0.1s" repeatCount="indefinite"/><animate attributeName="y" values="-16;-39;-16" dur="1.35s" begin="0.1s" repeatCount="indefinite"/></rect>
    <rect x="98"  y="-12" width="6" height="24"  rx="3"><animate attributeName="height" values="24;64;24" dur="1.45s" begin="0.35s" repeatCount="indefinite"/><animate attributeName="y" values="-12;-32;-12" dur="1.45s" begin="0.35s" repeatCount="indefinite"/></rect>
